version: "3.9"

networks:
  ctf-isolated:
    driver: bridge
    external: true
    name: ctf-isolated
services:
  terminal:
    build:
      context: ./ctf-terminal
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    networks:
      - ctf-isolated
    environment:
      - PORT=3001
    restart: unless-stopped

  app:
    image: ctf-backend
    build:
      context: ./ctf-backend
      dockerfile: Dockerfile
    volumes:
      - challenges_data:/app/challenges
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    networks:
      - ctf-isolated
    depends_on:
      - db
      - terminal
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://inno1-bif3-p1-w25.cs.technikum-wien.at:3000,http://inno1-bif3-p1-w25.cs.technikum-wien.at,https://inno1-bif3-p1-w25.cs.technikum-wien.at}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - TERMINAL_GATEWAY_URL=http://terminal:3001
      - TERMINAL_WS_URL=ws://terminal:3001
    command: bash -c "java -Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts -Djavax.net.ssl.trustStorePassword=changeit -jar app.jar"
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ctfuser
      POSTGRES_PASSWORD: ctfpass
      POSTGRES_DB: ctf
    ports:
      - "5432:5432"
    networks:
      - ctf-isolated
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    image: ctf-frontend
    build:
      context: ./ctf-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - ctf-isolated
    environment:
      - API_URL=${API_URL:-http://app:8080}
      - API_PROXY_TARGET=${API_PROXY_TARGET:-http://app:8080}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - TERMINAL_WS_URL=${TERMINAL_WS_URL:-ws://localhost:3001}
    depends_on:
      - app
      - terminal

volumes:
  pgdata:
  challenges_data:
